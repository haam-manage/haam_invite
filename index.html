<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAAM 공동사용자 초대</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #f8f9fa; color: #1a1a1a; font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }
    .container { max-width: 480px; margin: 0 auto; padding: 40px 20px 60px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 22px; font-weight: 700; color: #AA988A; }
    .logo p  { font-size: 13px; color: #888; margin-top: 6px; }
    .card { background: #fff; border-radius: 16px; padding: 28px 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
    .section-title {
      font-size: 13px; font-weight: 700; color: #AA988A;
      margin: 24px 0 14px; padding-bottom: 8px;
      border-bottom: 1.5px solid #f0ebe8;
    }
    .section-title:first-child { margin-top: 0; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
    input[type=text], input[type=tel] {
      width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0;
      border-radius: 10px; font-size: 15px; font-family: 'Noto Sans KR', sans-serif;
      color: #1a1a1a; background: #fafafa; transition: border-color 0.2s; outline: none;
    }
    input:focus { border-color: #AA988A; background: #fff; }
    .hint { font-size: 12px; color: #aaa; margin-top: 5px; }
    .info-box {
      background: #faf9f8; border: 1.5px solid #ede9e6; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 20px; font-size: 13px; color: #888; line-height: 1.7;
    }
    .btn {
      width: 100%; padding: 14px; background: #AA988A; color: #fff;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif; cursor: pointer; margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:active   { background: #8c7b6e; }
    .btn:disabled { background: #ccc; cursor: default; }
    .result {
      display: none; margin-top: 20px; padding: 16px;
      border-radius: 10px; font-size: 14px; line-height: 1.6; text-align: center;
    }
    .result.success { background: #f0faf0; color: #2d7a2d; }
    .result.error   { background: #fff0f0; color: #c0392b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>HAAM 도심창고:함</h1>
      <p>공동사용자 초대</p>
    </div>
    <div class="card">

      <div class="info-box">
        입력하신 공동사용자 전화번호로 등록 링크가 발송됩니다.<br>
        공동사용자가 링크를 통해 직접 등록을 완료하면<br>
        대표자님께 확인 알림톡이 발송됩니다.
      </div>

      <!-- 대표자 확인 -->
      <div class="section-title">대표자 확인</div>
      <div class="form-group">
        <label>보관함 번호</label>
        <input type="text" id="cabinet" placeholder="예: M01, L03, XL01" maxlength="6">
      </div>
      <div class="form-group">
        <label>대표자 전화번호 끝 4자리</label>
        <input type="tel" id="repPhone4" placeholder="예: 1234" maxlength="4">
        <p class="hint">본인 확인을 위해 대표자 전화번호 끝 4자리를 입력해주세요.</p>
      </div>

      <!-- 초대할 공동사용자 -->
      <div class="section-title">초대할 공동사용자</div>
      <div class="form-group">
        <label>공동사용자 이름</label>
        <input type="text" id="coUserName" placeholder="공동사용자 실명 입력">
        <p class="hint">알림톡 발송 시 사용됩니다.</p>
      </div>
      <div class="form-group">
        <label>공동사용자 전화번호</label>
        <input type="tel" id="coUserPhone" placeholder="숫자만 입력 (예: 01012345678)">
        <p class="hint">초대 링크가 이 번호로 카카오 알림톡으로 발송됩니다.</p>
      </div>

      <button class="btn" id="submitBtn" onclick="submitInvite()">초대 링크 발송</button>
      <div class="result" id="result"></div>
    </div>
  </div>

  <script>
    // ★ 실제 GAS 배포 URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzCrBrslP52xT1DlqKUipHS2cT7yoik31owFMIkk9K3aW2lKxQZ9YTAx2tmVF700aBT_g/exec';

    function submitInvite() {
      const cabinet     = document.getElementById('cabinet').value.trim().toUpperCase();
      const repPhone4   = document.getElementById('repPhone4').value.trim();
      const coUserName  = document.getElementById('coUserName').value.trim();
      const coUserPhone = document.getElementById('coUserPhone').value.trim().replace(/[^0-9]/g, '');

      // ── 입력값 검증 ──
      if (!cabinet) {
        showResult('보관함 번호를 입력해주세요.', false); return;
      }
      if (!repPhone4 || repPhone4.length !== 4) {
        showResult('대표자 전화번호 끝 4자리를 정확히 입력해주세요.', false); return;
      }
      if (!coUserName) {
        showResult('공동사용자 이름을 입력해주세요.', false); return;
      }
      if (!coUserPhone || coUserPhone.length < 10) {
        showResult('공동사용자 전화번호를 정확히 입력해주세요.', false); return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled    = true;
      btn.textContent = '발송 중...';

      // ── CORS 우회: Content-Type을 text/plain으로 설정 ──
      // application/json 헤더는 브라우저 preflight(OPTIONS)를 유발해 CORS 차단됨
      // GAS는 text/plain body도 e.postData.contents로 정상 수신함
      fetch(GAS_URL, {
        method:   'POST',
        redirect: 'follow',
        headers:  { 'Content-Type': 'text/plain;charset=UTF-8' },
        body: JSON.stringify({
          action     : 'inviteCoUser',
          cabinet,
          repPhone4,
          coUserName,
          coUserPhone
        })
      })
      .then(function(res) {
        // GAS 응답이 text/html로 올 수도 있으므로 text로 먼저 받은 뒤 JSON 파싱
        return res.text();
      })
      .then(function(text) {
        btn.disabled    = false;
        btn.textContent = '초대 링크 발송';
        try {
          const data = JSON.parse(text);
          showResult(data.message, data.success);
          if (data.success) btn.disabled = true;  // 성공 후 중복 발송 방지
        } catch (e) {
          // JSON 파싱 실패 = GAS가 HTML 반환 (배포 설정 문제)
          showResult('서버 응답 오류가 발생했습니다. 관리자에게 문의해주세요.', false);
          console.error('응답 파싱 실패:', text);
        }
      })
      .catch(function(err) {
        btn.disabled    = false;
        btn.textContent = '초대 링크 발송';
        showResult('네트워크 오류가 발생했습니다. 다시 시도해주세요.', false);
        console.error('fetch 오류:', err);
      });
    }

    function showResult(msg, success) {
      const el = document.getElementById('result');
      el.style.display = 'block';
      el.className     = 'result ' + (success ? 'success' : 'error');
      el.textContent   = msg;
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  </script>
</body>
</html>
